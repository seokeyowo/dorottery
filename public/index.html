<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>도로롱 기계식 키보드 갤러리 추첨기</title>
<link rel="icon" type="image/png" href="burger.png" />
<link rel="shortcut icon" type="image/png" href="burger.png" />
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
:root{
  --bg:#f7f5f1; --panel:#ffffff; --line:#e8e3db;
  --ink:#26221d; --muted:#7a7368;
  --accent:#5b6f8a; --accent-soft:#eef1f6;
  --warn:#b8763a; --ok:#3f8a5a; --err:#b34747;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100vh;background:var(--bg);color:var(--ink);
  font-family:-apple-system,"Segoe UI","Malgun Gothic",sans-serif;font-size:14px;line-height:1.5}
.hidden{display:none!important}
.muted{color:var(--muted);font-size:12px}
.err{color:var(--err);font-size:13px;margin-top:6px}
.mt{margin-top:10px}

.topbar{display:flex;align-items:center;gap:14px;padding:14px 24px;
  background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
.brand{display:flex;align-items:center;gap:12px;font-weight:700;font-size:17px}
.brand img{width:38px;height:38px;border-radius:8px;object-fit:cover;border:1px solid var(--line)}
.ver{margin-left:auto;color:var(--muted);font-size:11px;font-family:ui-monospace,monospace}

.layout{max-width:1200px;margin:0 auto;padding:20px;display:grid;
  grid-template-columns:minmax(360px,440px) 1fr;gap:20px;align-items:start}
@media(max-width:880px){.layout{grid-template-columns:1fr}}

.col-left{display:flex;flex-direction:column;gap:14px}
.col-right{position:sticky;top:78px;display:flex;flex-direction:column;gap:14px}
@media(max-width:880px){.col-right{position:static}}

.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px}
.sec{margin:0 0 12px;font-size:12px;font-weight:700;letter-spacing:1.5px;
  color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--line);padding-bottom:8px}
.fairness{background:#fbf9f4}
.hash{display:block;font-family:ui-monospace,monospace;font-size:13px;
  background:#f0ede5;padding:8px 10px;border-radius:6px;color:var(--ink);
  margin-top:6px;word-break:break-all;border:1px solid var(--line)}
.tabs{display:flex;gap:6px;align-items:center;border-bottom:1px solid var(--line);
  margin-bottom:10px;padding-bottom:6px}
.tab{background:transparent;border:none;padding:8px 12px;border-radius:6px 6px 0 0;
  color:var(--muted);font-weight:700;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-7px}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.log-entry{padding:10px 12px;border-bottom:1px solid var(--line);font-size:12px}
.log-entry:last-child{border:none}
.log-head{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:6px}
.log-time{color:var(--muted);font-family:ui-monospace,monospace}
.log-meta{font-family:ui-monospace,monospace;color:var(--muted);font-size:11px;line-height:1.5;
  background:#f4f1ec;padding:6px 8px;border-radius:5px;margin-top:6px;word-break:break-all}
.log-meta b{color:var(--ink)}
.log-winners{margin-top:6px}
.log-winners .win{display:inline-block;padding:3px 9px;background:var(--accent);color:#fff;
  font-weight:700;border-radius:5px;margin:2px 4px 2px 0;font-size:12px}
.log-verify{font-size:11px;margin-top:6px;color:var(--ok);font-weight:600}
.log-verify.bad{color:var(--err)}
.draw-foot{margin-top:14px;padding:14px;background:#faf8f4;border:1px solid var(--line);
  border-radius:8px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.draw-summary{font-size:14px;color:var(--muted);font-weight:600}
.big-num{font-size:22px;font-weight:800;color:var(--ink);font-family:ui-monospace,monospace}
.big-num.accent{color:var(--accent)}
.method-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.mcard{display:flex;align-items:center;gap:6px;padding:10px 8px;
  background:#fff;border:1px solid var(--line);border-radius:8px;cursor:pointer;
  font-size:13px;font-weight:600;color:var(--muted);text-align:left}
.mcard span{font-size:20px;line-height:1}
.mcard:hover{border-color:var(--accent);color:var(--ink)}
.mcard.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.row{display:flex;gap:8px;flex-wrap:wrap}
.row>input{flex:1;min-width:160px}
input[type=text],input[type=number],input:not([type]){width:100%;padding:9px 12px;
  background:#fff;color:var(--ink);border:1px solid var(--line);border-radius:7px;
  font-size:13px;font-family:inherit}
input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,111,138,.12)}
label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:600}

button{cursor:pointer;font-family:inherit;font-size:13px;padding:9px 14px;border-radius:7px;
  border:1px solid var(--line);background:#fff;color:var(--ink)}
button:hover{background:#f4f1ec}
button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
button.primary:hover{background:#4a5d75}
button.ghost{background:transparent}
button.lg{padding:11px 20px;font-size:14px;font-weight:700}
button:disabled{opacity:.55;cursor:not-allowed;filter:grayscale(40%)}
button.primary:disabled{background:#9aa5b5;border-color:#9aa5b5}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.4);
  border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;vertical-align:-2px}
@keyframes spin{to{transform:rotate(360deg)}}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;
  background:var(--accent-soft);color:var(--accent);font-size:11px;font-weight:700}
.chip-toggle{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;
  border:1px solid var(--line);border-radius:999px;background:#fff;font-size:12px;cursor:pointer}
.chip-toggle:hover{border-color:var(--accent)}
.chip-toggle input{accent-color:var(--accent)}

.badge{display:inline-block;padding:2px 9px;border-radius:999px;font-size:10px;font-weight:700}
.badge.ok{background:#e3f0e8;color:var(--ok)}

.post-info{margin-top:10px;padding:10px;background:#faf8f4;border-radius:8px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;border:1px solid var(--line)}
.post-title{flex:1;min-width:180px;font-weight:600;font-size:13px}

.subcard{margin-top:12px;padding:12px;border:1px solid var(--line);border-radius:8px;background:#fbf8f3}
.sub-head{display:flex;justify-content:space-between;align-items:center}
.sub-head strong{color:var(--warn);font-size:13px}
.hint{color:var(--muted);font-size:11px;margin-top:6px;line-height:1.5}

.switch{position:relative;display:inline-block;width:38px;height:22px}
.switch input{opacity:0;width:0;height:0}
.switch span{position:absolute;cursor:pointer;inset:0;background:#d8d2c8;border-radius:22px;transition:.15s}
.switch span:before{content:"";position:absolute;height:16px;width:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.15)}
.switch input:checked + span{background:var(--accent)}
.switch input:checked + span:before{transform:translateX(16px)}

.pool{max-height:calc(100vh - 280px);min-height:300px;overflow:auto;
  background:#faf8f4;border-radius:8px;border:1px solid var(--line);font-size:13px}
.pool::-webkit-scrollbar{width:8px}
.pool::-webkit-scrollbar-thumb{background:#d8d2c8;border-radius:4px}
.pool-item{padding:8px 12px;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:baseline}
.pool-item:last-child{border:none}
.pool-name{color:var(--accent);font-weight:700;flex-shrink:0;min-width:80px}
.pool-tag{font-size:10px;color:var(--muted);background:#eee;padding:1px 7px;border-radius:4px;font-weight:600}
.pool-tag.fixed{background:#dde6f0;color:var(--accent)}
.pool-tag.floating{background:#f0e4d4;color:var(--warn)}
.pool-text{flex:1;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pool-stats{font-size:11px;color:var(--muted);margin-left:auto;flex-shrink:0;font-family:ui-monospace,monospace}

.modal{position:fixed;inset:0;background:rgba(38,34,29,.5);display:flex;
  align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-card{background:#fff;border-radius:12px;padding:24px;max-width:480px;width:100%;
  text-align:center;animation:pop .25s ease;border:1px solid var(--line);transform-origin:center}
@keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.winner-big{font-size:26px;font-weight:800;color:var(--accent);margin:14px 0;padding:18px;
  background:var(--accent-soft);border-radius:8px}
.winner-big small{display:block;font-size:13px;color:var(--ink);font-weight:400;margin-top:6px}
.winner-list{text-align:left;max-height:320px;overflow:auto}
.winner-list .pool-item{background:#faf8f4;margin-bottom:4px;border-radius:6px;border:1px solid var(--line)}
.result-burst{position:absolute;inset:auto auto 18px 50%;transform:translateX(-50%);
  width:320px;height:320px;border-radius:50%;pointer-events:none;opacity:.18;
  background:radial-gradient(circle, rgba(255,214,107,.9) 0%, rgba(255,214,107,.28) 28%, rgba(255,214,107,0) 65%);
  animation:burst 1.1s ease-out infinite}
@keyframes burst{0%{transform:translateX(-50%) scale(.4);opacity:0}35%{opacity:.32}100%{transform:translateX(-50%) scale(1.8);opacity:0}}
.battle-shell{position:relative}
.battle-shake{animation:shake .15s linear 2}
.battle-flash{position:absolute;inset:0;background:radial-gradient(circle at center, rgba(255,214,107,.35), rgba(255,214,107,0) 55%);
  pointer-events:none;opacity:0;transition:opacity .12s}
.battle-flash.on{opacity:1}
@keyframes shake{0%{transform:translate(0,0)}25%{transform:translate(-3px,2px)}50%{transform:translate(3px,-2px)}75%{transform:translate(-2px,1px)}100%{transform:translate(0,0)}}

.busy-overlay{position:fixed;inset:0;background:rgba(247,245,241,.78);backdrop-filter:blur(2px);
  z-index:220;display:flex;align-items:center;justify-content:center;padding:24px}
.busy-card{min-width:min(92vw,420px);background:#fff;border:1px solid var(--line);border-radius:16px;
  box-shadow:0 18px 60px rgba(38,34,29,.16);padding:24px 22px;text-align:center}
.busy-spinner{width:40px;height:40px;border:4px solid rgba(91,111,138,.18);border-top-color:var(--accent);
  border-radius:50%;margin:0 auto 14px;animation:spin .9s linear infinite}
.busy-title{font-size:18px;font-weight:800;color:var(--ink)}
.busy-sub{margin-top:6px;font-size:12px;color:var(--muted);line-height:1.5}
.app-disabled{pointer-events:none;user-select:none;filter:saturate(.85)}

body{padding-bottom:80px}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <img src="burger.png" alt="logo" onerror="this.style.display='none'" />
    <span>도로롱 기계식 키보드 갤러리 추첨기</span>
  </div>
  <div class="ver">v1.3.0</div>
</header>

<div class="layout">
  <!-- 왼쪽: 옵션 -->
  <div class="col-left">
    <section class="card">
      <h3 class="sec">게시글 불러오기</h3>
      <div class="row">
        <input id="postUrl" type="text" placeholder="https://gall.dcinside.com/board/view/?id=..." />
        <button id="loadBtn" class="primary">불러오기</button>
      </div>
      <div id="postInfo" class="post-info hidden">
        <span class="chip" id="galleryChip"></span>
        <span class="muted" id="commentCount"></span>
        <div class="post-title" id="postTitle"></div>
      </div>
      <div id="loadErr" class="err"></div>
    </section>

    <section class="card">
      <h3 class="sec">참여 조건</h3>
      <div class="chips">
        <label class="chip-toggle"><input type="checkbox" id="excludeFloating" /> 유동 제외</label>
        <label class="chip-toggle"><input type="checkbox" id="excludeAnon" /> 익명 제외</label>
        <label class="chip-toggle"><input type="checkbox" id="dedup" checked /> 1인 1댓</label>
        <label class="chip-toggle"><input type="checkbox" id="usePostCommentSum" /> 글댓합 사용</label>
      </div>
      <div class="hint">글댓합은 기본 꺼짐입니다. 필요할 때만 켜고, 같은 글을 짧은 시간에 반복 조회하면 디시 임시밴이 걸릴 수 있습니다.</div>
      <div class="row mt">
        <input id="includeKw" placeholder="필수 단어 (쉼표 구분)" />
        <input id="excludeKw" placeholder="금지 단어 (쉼표 구분)" />
      </div>
      <div class="row mt">
        <input id="minSum" type="number" min="0" value="0" placeholder="컷트라인: 글+댓글 합계" />
      </div>

    </section>

    <section class="card">
      <h3 class="sec">도움말</h3>
      <div class="hint">불러오기는 댓글 페이지를 여러 번 요청할 수 있어요.</div>
      <div class="hint" style="margin-top:8px">같은 링크를 단시간에 반복 조회하면 DC에서 임시 차단될 수 있으니, 필요한 경우에만 다시 불러오세요.</div>
    </section>

    <section class="card">
      <h3 class="sec">추첨</h3>
      <label>연출</label>
      <div class="method-cards" id="methodSeg">
        <button class="mcard active" data-method="basic"><span>⚡</span>즉시</button>
        <button class="mcard" data-method="roulette"><span>🎡</span>룰렛</button>
        <button class="mcard" data-method="slot"><span>🎰</span>슬롯</button>
        <button class="mcard" data-method="card"><span>🃏</span>카드뽑기</button>
        <button class="mcard" data-method="battle"><span>⚔️</span>배틀로얄</button>
      </div>
      <div class="grid2 mt">
        <div><label>당첨 인원</label><input id="winnerCount" type="number" min="1" value="1" /></div>
        <div><label>추첨 횟수</label><input id="drawTotal" type="number" min="0" value="0" disabled style="background:#f0ede5" /></div>
      </div>
    </section>

  </div>

  <!-- 오른쪽: 명단 + 추첨 -->
  <div class="col-right">
    <section class="card draw-card">
      <div class="tabs">
        <button class="tab active" data-tab="pool">참여자 명단 <span class="muted" id="poolCount">(0)</span></button>
        <button class="tab" data-tab="log">추첨 기록 <span class="muted" id="logCount">(0)</span></button>
        <span class="muted" id="footDesc" style="margin-left:auto;align-self:center">URL을 입력해주세요</span>
      </div>
      <div id="pool" class="pool tabpane"><div class="muted" style="padding:14px">아직 비어있습니다.</div></div>
      <div id="logPane" class="pool tabpane hidden"><div class="muted" style="padding:14px">아직 추첨 기록이 없습니다.</div></div>
      <div class="draw-foot">
        <div class="draw-summary">
          <span class="big-num" id="poolNum">0</span>명 중
          <span class="big-num accent" id="winNum">1</span>명 추첨
        </div>
        <button id="drawBtn" class="primary lg" disabled>🎲 추첨 시작</button>
      </div>
    </section>
  </div>
</div>

<!-- 결과 모달 -->
<div id="resultModal" class="modal hidden">
  <div class="modal-card" id="resultCard">
    <div id="resultBody"></div>
    <div class="row" style="justify-content:center;margin-top:14px">
      <button class="ghost" id="snapBtn">📸 스크린샷 저장</button>
      <button class="ghost" id="closeResult">닫기</button>
    </div>
    <div id="snapStatus" class="muted" style="margin-top:6px;font-size:11px"></div>
  </div>
</div>

<div id="busyOverlay" class="busy-overlay hidden" aria-live="polite" aria-busy="true">
  <div class="busy-card">
    <div class="busy-spinner"></div>
    <div id="busyTitle" class="busy-title">작업 중</div>
    <div id="busySub" class="busy-sub">잠시만 기다려 주세요.</div>
  </div>
</div>

<script>
// 백엔드 API는 북마클릿 방식 전환으로 더 이상 필수가 아닙니다 (로컬 fallback만).
const BACKEND_URL = "";
const API = BACKEND_URL || ((location.protocol === "file:") ? "http://localhost:3939" : "");
const SITE_URL = location.origin + location.pathname;


// ── 페이지 로드 시 hash 데이터 파싱 ──────────────────
(function loadFromHash() {
  const m = location.hash.match(/[#&]data=([^&]+)/);
  if (!m) return;
  try {
    const json = decodeURIComponent(escape(atob(m[1])));
    const data = JSON.parse(json);
    if (data.site && data.comments) {
      history.replaceState(null, "", location.pathname); // clean URL
      setTimeout(() => applyFetchedData(data), 50);
    }
  } catch (e) { console.error("hash parse fail", e); }
})();

function applyFetchedData(data) {
  state.site = data.site;
  state.comments = data.comments;
  state.profiles = data.profiles || {};
  document.getElementById("galleryChip").textContent = data.galleryName;
  document.getElementById("commentCount").textContent = `· ${data.total}개 댓글`;
  document.getElementById("postTitle").textContent = data.title;
  document.getElementById("postInfo").classList.remove("hidden");
  refreshPool();
}
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const state = { site:null, comments:[], profiles:{}, method:"basic", logs:[] };

function setBusy(on, title = "작업 중", sub = "잠시만 기다려 주세요.") {
  $("busyTitle").textContent = title;
  $("busySub").textContent = sub;
  $("busyOverlay").classList.toggle("hidden", !on);
  document.body.classList.toggle("app-disabled", on);
  ["postUrl","loadBtn","drawBtn","winnerCount","includeKw","excludeKw","excludeFloating","excludeAnon","dedup","usePostCommentSum"]
    .forEach(id => {
      const el = $(id);
      if (el) el.disabled = on;
    });
}

// 순수 랜덤 셔플
function randomShuffle(arr) {
  const a = arr.slice();
  for (let i=a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// ── 조작방지: 비트코인 블록 해시 기반 엔트로피 ──
async function sha256Hex(s) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
}
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = seed; t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
async function deterministicPick(pool, n, seedStr) {
  const h = await sha256Hex(seedStr);
  const rng = mulberry32(parseInt(h.slice(0,8), 16));
  const a = pool.slice();
  for (let i=a.length-1; i>0; i--) {
    const j = Math.floor(rng()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a.slice(0, n);
}
async function poolFingerprint(pool) {
  const s = pool.map(c => c.userId || c.name).sort().join("|");
  return (await sha256Hex(s)).slice(0, 16);
}
async function getBitcoinBlock() {
  // mempool.space 공개 API — CORS 허용됨
  const h = await fetch("https://mempool.space/api/blocks/tip/height").then(r=>r.text());
  const height = parseInt(h);
  const hash = (await fetch("https://mempool.space/api/blocks/tip/hash").then(r=>r.text())).trim();
  return { height, hash };
}

// 탭 전환
document.querySelectorAll(".tab").forEach(t => {
  t.onclick = () => {
    document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
    t.classList.add("active");
    const target = t.dataset.tab;
    document.getElementById("pool").classList.toggle("hidden", target !== "pool");
    document.getElementById("logPane").classList.toggle("hidden", target !== "log");
  };
});

function fmtTime(ts) {
  const d = new Date(ts);
  const p = n => String(n).padStart(2,"0");
  return `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}

function renderLogs() {
  const el = document.getElementById("logPane");
  document.getElementById("logCount").textContent = `(${state.logs.length})`;
  document.getElementById("drawTotal").value = state.logs.length;
  if (!state.logs.length) { el.innerHTML = '<div class="muted" style="padding:14px">아직 추첨 기록이 없습니다.</div>'; return; }
  el.innerHTML = state.logs.slice().reverse().map((l,idx) => {
    const num = state.logs.length - idx;
    const ent = l.entropy || {};
    let entropyHtml = "";
    if (ent.source === "bitcoin") {
      const short = ent.hash ? ent.hash.slice(0, 16) + "…" : "";
      entropyHtml = `<div class="log-meta"><b>🔗 엔트로피 소스</b> 비트코인 블록 #${ent.height}<br/>
        <b>블록 해시</b> <code style="font-size:10px">${esc(short)}</code>
        <a href="https://mempool.space/ko/block/${esc(ent.hash)}" target="_blank" style="color:var(--accent);margin-left:6px;font-size:10px">↗ 탐색기에서 검증</a><br/>
        <b>참여자 지문</b> <code style="font-size:10px">${esc(l.poolFp||"")}</code></div>`;
    } else if (ent.source === "time") {
      entropyHtml = `<div class="log-meta"><b>⚠ 로컬 랜덤</b> (블록 조회 실패 폴백)</div>`;
    }
    return `<div class="log-entry">
      <div class="log-head">
        <strong>#${num} · ${esc(l.method)}</strong>
        <span class="log-time">${fmtTime(l.ts)}</span>
      </div>
      <div class="log-winners">${l.winners.map(w => `<span class="win">${esc(w.name)}</span>`).join("")}</div>
      <div class="log-meta"><span style="color:#aaa">후보 ${l.poolSize}명 중 ${l.winners.length}명</span></div>
      ${entropyHtml}
      <div class="row" style="margin-top:6px">
        <button class="ghost" data-vid="${l.id}" style="padding:4px 10px;font-size:11px">재검증</button>
        <span class="log-verify" id="vstat-${l.id}"></span>
      </div>
    </div>`;
  }).join("");
  // 재검증 버튼 핸들러
  el.querySelectorAll("[data-vid]").forEach(btn => {
    btn.onclick = async () => {
      const id = btn.dataset.vid;
      const log = state.logs.find(l => l.id === id);
      if (!log) return;
      const stat = document.getElementById(`vstat-${id}`);
      stat.textContent = "계산 중…";
      const rePick = await deterministicPick(log.snapshotPool, log.winners.length, log.seed);
      const a = rePick.map(p => p.userId || p.name).join("|");
      const b = log.winners.map(w => w.key).join("|");
      const ok = a === b;
      stat.textContent = ok ? "✅ 동일 결과 재현됨" : "❌ 결과 불일치";
      stat.className = "log-verify" + (ok ? "" : " bad");
    };
  });
}

let loading = false;
let profileLoading = false;

async function autoLoadProfiles() {
  if (profileLoading) return;
  const byUid = new Map();
  for (const c of state.comments) {
    if (!c.userId) continue;
    const prev = byUid.get(c.userId);
    if (!prev || (!prev.popupHtml && c.popupHtml)) byUid.set(c.userId, { userId: c.userId, popupHtml: c.popupHtml || "" });
  }
  const users = [...byUid.values()];
  if (!users.length) return;
  profileLoading = true;
  $("loadBtn").disabled = true;
  $("loadBtn").innerHTML = `<span class="spinner"></span> 작성자 조회 중`;
  setBusy(true, "작성자 정보 조회 중", `0 / ${users.length} 명 조회 중...`);
  try {
    const res = await fetch(API + "/api/profiles/stream", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ site: state.site, users })
    });
    if (!res.ok) {
      let msg = "프로필 조회 실패";
      try { const j = await res.json(); msg = j.error || msg; } catch {}
      throw new Error(msg);
    }
    if (!res.body) throw new Error("stream unsupported");
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";
    let lastRender = 0;
    const startedAt = Date.now();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split("\n");
      buf = lines.pop();
      for (const line of lines) {
        const s = line.trim(); if (!s) continue;
        let ev; try { ev = JSON.parse(s); } catch { continue; }
        if (ev.type === "item") {
          state.profiles[ev.uid] = ev.data;
          const elapsed = (Date.now() - startedAt) / 1000;
          const rate = ev.done / Math.max(elapsed, 0.1);
          const remain = Math.max(0, ev.total - ev.done);
          const eta = rate > 0 ? Math.ceil(remain / rate) : 0;
          setBusy(true, "작성자 정보 조회 중",
            `${ev.done} / ${ev.total} 명 조회 완료` + (remain ? ` · 남은 시간 약 ${eta}초` : ""));
          if (Date.now() - lastRender > 300) { refreshPool(); lastRender = Date.now(); }
        }
      }
    }
    refreshPool();
    $("loadErr").textContent = "";
  } catch (e) {
    $("loadErr").textContent = "작성자 정보 조회 실패: " + e.message;
  } finally {
    profileLoading = false;
    $("loadBtn").innerHTML = "불러오기";
    $("loadBtn").disabled = false;
    setBusy(false);
  }
}

$("loadBtn").onclick = async () => {
  if (loading) return;
  const url = $("postUrl").value.trim();
  $("loadErr").textContent = "";
  if (!url) { $("loadErr").textContent = "URL을 입력하세요."; return; }
  loading = true;
  $("loadBtn").disabled = true;
  $("postUrl").disabled = true;
  // 경과 시간 표시
  const startAt = Date.now();
  let dots = 0;
  const tick = setInterval(() => {
    dots = (dots + 1) % 4;
    const sec = Math.floor((Date.now() - startAt) / 1000);
    $("loadBtn").innerHTML = `<span class="spinner"></span> 가져오는 중${".".repeat(dots)} <span style="opacity:.7">${sec}s</span>`;
  }, 300);
  // 60초 타임아웃
  const ctrl = new AbortController();
  const timeoutId = setTimeout(() => ctrl.abort(), 60_000);
  try {
    const res = await fetch(API + "/api/fetch?url=" + encodeURIComponent(url), { signal: ctrl.signal });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "조회 실패");
    state.site = data.site; state.comments = data.comments; state.profiles = {};
    $("galleryChip").textContent = data.galleryName;
    $("commentCount").textContent = `· ${data.total}개 댓글`;
    $("postTitle").textContent = data.title;
    $("postInfo").classList.remove("hidden");
    refreshPool();
    if ($("usePostCommentSum").checked) autoLoadProfiles();
  } catch (e) {
    if (e.name === "AbortError") {
      $("loadErr").textContent = "60초 초과 — DC가 응답하지 않습니다. 잠시 후 재시도하세요.";
    } else {
      $("loadErr").textContent = "실패: " + e.message;
    }
  } finally {
    clearTimeout(timeoutId);
    clearInterval(tick);
    loading = false;
    $("loadBtn").disabled = false;
    $("postUrl").disabled = false;
    $("loadBtn").textContent = "불러오기";
  }
};

function getPool(wantStages) {
  // 파이프라인: state.comments(모든 댓글, 중복 포함) → ① 유동/익명 → ② 키워드 → ③ 1인1댓
  const incKw = $("includeKw").value.split(",").map(s=>s.trim()).filter(Boolean);
  const excKw = $("excludeKw").value.split(",").map(s=>s.trim()).filter(Boolean);
  const exFloating = $("excludeFloating").checked;
  const exAnon = $("excludeAnon").checked;
  const dedup = $("dedup").checked;
  const useSum = $("usePostCommentSum").checked;
  const minSum = parseInt($("minSum").value) || 0;

  const stages = { total: state.comments.length };

  // ① 유동/익명 제외
  let s1 = state.comments.filter(c => {
    if (exFloating && c.type === "floating") return false;
    if (exAnon && c.type === "anonymous") return false;
    return true;
  });
  stages.afterType = s1.length;

  // ② 키워드
  let s2 = s1.filter(c => {
    if (incKw.length && !incKw.some(k => c.text.includes(k))) return false;
    if (excKw.length && excKw.some(k => c.text.includes(k))) return false;
    return true;
  });
  stages.afterKeyword = s2.length;

  // ③ 글댓합 필터
  let s3 = s2;
  if (useSum) {
    s3 = s2.filter(c => {
      const p = state.profiles[c.userId];
      if (!p) return true;
      return (Number(p.posts) + Number(p.replies)) >= minSum;
    });
  }
  stages.afterSum = s3.length;

  // ④ 1인1댓 dedup — 위 단계에서 살아남은 댓글 중 사용자별 첫 번째만 유지
  let out = s3;
  if (dedup) {
    const seen = new Set();
    out = out.filter(c => { const k = (c.userId || c.name).toLowerCase();
      if (seen.has(k)) return false; seen.add(k); return true; });
  }
  stages.final = out.length;

  return wantStages ? { out, stages } : out;
}

function refreshPool() {
  const { out: pool, stages } = getPool(true);
  $("poolCount").textContent = `(${pool.length}명)`;
  if (!state.comments.length) {
    $("footDesc").textContent = "URL을 입력해주세요";
  } else {
    // 활성 단계만 표시해 파이프라인 흐름을 보여줌
    const parts = [`전체 ${stages.total}`];
    if (stages.afterType !== stages.total) parts.push(`타입필터 ${stages.afterType}`);
    if (stages.afterKeyword !== stages.afterType) parts.push(`키워드 ${stages.afterKeyword}`);
    if (stages.afterSum !== stages.afterKeyword) parts.push(`글댓합≥${minSum} ${stages.afterSum}`);
    if ($("dedup").checked && stages.final !== stages.afterSum) parts.push(`1인1댓 ${stages.final}`);
    else if (stages.final === stages.total) parts.push(`후보 ${stages.final}`);
    $("footDesc").textContent = parts.join(" → ");
  }
  $("poolNum").textContent = pool.length;
  $("winNum").textContent = Math.min(parseInt($("winnerCount").value)||1, Math.max(pool.length,1));
  $("drawBtn").disabled = pool.length === 0;
  if (!state.comments.length) { $("pool").innerHTML = "아직 게시글을 불러오지 않았습니다."; return; }
  if (!pool.length) { $("pool").innerHTML = '<div class="muted" style="padding:8px">필터 조건에 맞는 후보가 없습니다.</div>'; return; }
  $("pool").innerHTML = pool.slice(0, 200).map(c => {
    const p = state.profiles[c.userId];
    const stat = p ? `글 ${p.posts} / 댓 ${p.replies} / 합 ${(Number(p.posts)||0)+(Number(p.replies)||0)}` : "정보 조회 중";
    const tag = c.type === 'fixed' ? '고닉' : c.type === 'floating' ? '유동' : '익명';
    return `<div class="pool-item"><span class="pool-name">${esc(c.name)}</span>
      <span class="pool-tag ${c.type}">${tag}</span>
      <span class="pool-text">${esc(c.text)}</span>
      <span class="pool-stats">${stat}</span></div>`;
  }).join("") + (pool.length > 200 ? `<div class="muted" style="padding:8px">…외 ${pool.length-200}명</div>` : "");
}

$("drawBtn").onclick = async () => {
  const pool = getPool();
  if (!pool.length) return;
  const n = Math.min(Math.max(1, parseInt($("winnerCount").value)||1), pool.length);

  if (state.method === "card") {
    $("resultModal").classList.remove("hidden");
    cardInteractive(pool, n);
    return;
  }

  // 공정성 엔트로피: 비트코인 최신 블록 해시 + 현재 시각 조합
  setBusy(true, "블록 조회 중", "비트코인 최신 블록 해시를 확인하는 중입니다. 잠시만 기다려 주세요.");
  let entropy;
  try {
    const blk = await getBitcoinBlock();
    entropy = { source: "bitcoin", height: blk.height, hash: blk.hash, ts: Date.now() };
  } catch (e) {
    // 블록 조회 실패 시 시각+Math.random 폴백 (그래도 로그 남음)
    entropy = { source: "time", hash: Math.random().toString(36).slice(2) + Date.now().toString(36), ts: Date.now() };
  } finally {
    setBusy(false);
  }

  const fp = await poolFingerprint(pool);
  const seed = `${entropy.hash}::${fp}::${entropy.ts}`;
  const picked = await deterministicPick(pool, n, seed);

  recordLog({ method: state.method, pool, picked, entropy, fp, seed });
  showResult(picked, pool);
};

function recordLog({ method, pool, picked, entropy, fp, seed }) {
  state.logs.push({
    id: Date.now() + "-" + Math.random().toString(36).slice(2,6),
    ts: Date.now(),
    method,
    poolSize: pool.length,
    poolFp: fp,
    entropy,
    seed,
    snapshotPool: pool,
    winners: picked.map(p => ({ key: p.userId||p.name, name: p.name, text: p.text })),
  });
  renderLogs();
}

function showResult(picked, pool, seed) {
  $("resultModal").classList.remove("hidden");
  const m = state.method;
  if (m === "basic") renderResult(picked, seed);
  else if (m === "roulette") rouletteAnim(picked, pool, seed);
  else if (m === "slot") slotAnim(picked, pool, seed);
  else if (m === "card") cardAnim(picked, pool, seed);
  else if (m === "battle") battleAnim(picked, pool, seed);
}

function seedFoot() { return ""; } // 엔트로피 정보는 로그 탭에서 확인

    body = `<div class="result-burst"></div><div style="font-size:14px;font-weight:700;margin-bottom:10px">🏆 당첨자 ${picked.length}명</div>
      <div class="winner-list">${picked.map((w,i) => `<div class="pool-item">
        <span class="pool-name">${i+1}. ${esc(w.name)}</span>

  }

  const card = $("resultCard");
  card.style.transform = "scale(1.02)";
  setTimeout(() => { card.style.transform = ""; }, 220);
}

function rouletteAnim(picked, pool, seed) {
  const W = 420, H = 420, cx = W/2, cy = H/2, R = 180;
  const winner = picked[0];
  // 최대 24개까지 표시 (많으면 당첨자 + 무작위 샘플)
  const MAX = Math.min(pool.length, 24);
  let wheel = pool.slice();
  if (wheel.length > MAX) {
    const others = wheel.filter(p => (p.userId||p.name) !== (winner.userId||winner.name));
    others.sort(()=>Math.random()-0.5);
    wheel = [winner, ...others.slice(0, MAX-1)].sort(()=>Math.random()-0.5);
  }
  const winIdx = wheel.findIndex(p => (p.userId||p.name) === (winner.userId||winner.name));
  const N = wheel.length;
  const slice = (Math.PI*2) / N;

  $("resultBody").innerHTML = `
    <div style="font-size:13px;color:#888;margin-bottom:10px">🎡 룰렛</div>
    <div style="position:relative;display:flex;justify-content:center;align-items:center">
      <canvas id="rouletteC" width="${W}" height="${H}" style="max-width:100%"></canvas>
      <div style="position:absolute;top:4px;left:50%;transform:translateX(-50%);
        width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;
        border-top:22px solid #ff5252;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4));z-index:3"></div>
    </div>`;

  const c = document.getElementById("rouletteC").getContext("2d");
  const colors = ["#ffb347","#ffcc66","#f7a072","#b298dc","#8ecae6","#ffafcc","#a8dadc","#ffe66d"];
  // 바늘은 위(12시, -π/2). 당첨 섹터 중앙이 바늘에 오도록 최종 각도 계산
  const targetAngle = -Math.PI/2 - (winIdx * slice + slice/2);
  const turns = 6; // 총 회전수
  const duration = 4200;
  const start = performance.now();
  const from = 0;
  const to = targetAngle + Math.PI*2*turns;

  function easeOutQuart(t){ return 1 - Math.pow(1-t, 4); }

  function draw(angle) {
    c.clearRect(0,0,W,H);
    // 그림자
    c.save(); c.translate(cx, cy+8);
    c.fillStyle = "rgba(0,0,0,.25)"; c.beginPath(); c.ellipse(0,0,R*0.95,R*0.3,0,0,Math.PI*2); c.fill();
    c.restore();

    c.save();
    c.translate(cx, cy);
    c.rotate(angle);
    for (let i=0;i<N;i++) {
      const a0 = i*slice, a1 = (i+1)*slice;
      c.fillStyle = (i === winIdx) ? "#ffd66b" : colors[i%colors.length];
      c.beginPath(); c.moveTo(0,0); c.arc(0,0,R,a0,a1); c.closePath(); c.fill();
      c.strokeStyle = "#fff"; c.lineWidth = 2; c.stroke();
      // 이름 텍스트
      c.save();
      c.rotate(a0 + slice/2);
      c.fillStyle = "#2a2520"; c.font = `bold ${N<=12?14:11}px system-ui`;
      c.textAlign = "right"; c.textBaseline = "middle";
      const name = (wheel[i].name || "").slice(0, N<=12?10:8);
      c.fillText(name, R-10, 0);
      c.restore();
    }
    c.restore();
    // 허브
    c.fillStyle = "#3a2a55"; c.beginPath(); c.arc(cx,cy,22,0,Math.PI*2); c.fill();
    c.strokeStyle = "#ffd66b"; c.lineWidth=3; c.stroke();
    c.fillStyle = "#ffd66b"; c.beginPath(); c.arc(cx,cy,6,0,Math.PI*2); c.fill();
  }

  function tick(t){
    const p = Math.min(1, (t-start)/duration);
    const ang = from + (to-from)*easeOutQuart(p);
    draw(ang);
    if (p < 1) requestAnimationFrame(tick);
    else setTimeout(() => renderResult(picked, seed), 700);
  }
  requestAnimationFrame(tick);
}

function slotAnim(picked, pool, seed) {
  const winner = picked[0];
  const ROW = 64, VISIBLE = 3, CENTER = 1; // 중앙 줄이 당첨 라인
  const poolNames = pool.map(p => p.name || "?");
  const winnerName = winner.name || "?";

  // 긴 스트립을 만들어 위로 올림. 최종 중앙에 winnerName이 오도록 설계.
  // 각 릴마다 stops 개수 다르게 (연쇄 정지 느낌)
  const reels = [
    { stops: 30 + Math.floor(Math.random()*5), delay: 0 },
    { stops: 42 + Math.floor(Math.random()*5), delay: 400 },
    { stops: 56 + Math.floor(Math.random()*5), delay: 900 },
  ];

  function buildStrip(stops, finalName) {
    const arr = [];
    for (let i=0;i<stops;i++) arr.push(poolNames[Math.floor(Math.random()*poolNames.length)]);
    arr.push(finalName); // 마지막이 당첨자
    // 보여줄 위 여유
    arr.push(poolNames[Math.floor(Math.random()*poolNames.length)] || "?");
    return arr;
  }

  const reelsHtml = reels.map((r, i) => {
    const strip = buildStrip(r.stops, winnerName);
    return `
      <div class="slot-reel" style="flex:1;position:relative;background:#1a1410;border-radius:10px;overflow:hidden;
        height:${ROW*VISIBLE}px;margin:0 3px;box-shadow:inset 0 0 24px rgba(0,0,0,.6)">
        <div class="slot-strip" data-reel="${i}" style="display:flex;flex-direction:column;will-change:transform;
          transform:translateY(0)">
          ${strip.map(n => `<div style="height:${ROW}px;display:flex;align-items:center;justify-content:center;
            font-weight:800;font-size:18px;color:#fff;border-bottom:1px solid #2a2520;padding:0 6px;
            text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc((n||"").slice(0,10))}</div>`).join("")}
        </div>
      </div>`;
  }).join("");

  $("resultBody").innerHTML = `
    <div style="font-size:13px;color:#888;margin-bottom:10px">🎰 슬롯머신</div>
    <div style="position:relative;padding:10px;background:linear-gradient(180deg,#2a1810,#1a0f08);
      border-radius:14px;border:3px solid #c9a55e;box-shadow:0 8px 30px rgba(0,0,0,.3)">
      <div style="display:flex;justify-content:center;position:relative;height:${ROW*VISIBLE}px">
        ${reelsHtml}
        <div style="position:absolute;left:6px;right:6px;top:${ROW*CENTER}px;height:${ROW}px;
          border-top:2px solid #ffd66b;border-bottom:2px solid #ffd66b;
          background:linear-gradient(180deg,rgba(255,214,107,.12),rgba(255,214,107,.04));pointer-events:none;z-index:2;
          box-shadow:0 0 20px rgba(255,214,107,.3) inset"></div>
      </div>
    </div>`;

  // 각 릴 애니메이션 — CSS transition 사용
  reels.forEach((r, i) => {
    const el = document.querySelector(`.slot-strip[data-reel="${i}"]`);
    if (!el) return;
    const total = r.stops + 2; // buildStrip 길이
    // 최종 위치: 당첨자(index r.stops)가 중앙(CENTER) 라인에 오도록
    const finalY = -(r.stops - CENTER) * ROW;
    const dur = 2200 + r.delay;
    setTimeout(() => {
      el.style.transition = `transform ${dur}ms cubic-bezier(.17,.67,.2,1)`;
      el.style.transform = `translateY(${finalY}px)`;
    }, 40);
  });

  // 당첨 라인 하이라이트 + 결과
  setTimeout(() => {
    const shell = document.querySelector("#resultBody > div:nth-child(2)");
    if (shell) {
      shell.animate([
        { boxShadow: "0 8px 30px rgba(0,0,0,.3), 0 0 0 0 rgba(255,214,107,0)" },
        { boxShadow: "0 8px 30px rgba(0,0,0,.3), 0 0 40px 10px rgba(255,214,107,.6)" },
        { boxShadow: "0 8px 30px rgba(0,0,0,.3), 0 0 0 0 rgba(255,214,107,0)" },
      ], { duration: 600, iterations: 2 });
    }
    renderResult(picked, seed);
  }, 3500);
}

// ── 카드뽑기 (유저 클릭이 당첨 결정) ─────────────
function cardInteractive(pool, n) {
  // 풀 전원을 카드로 (순서는 랜덤)
  const cards = pool.slice().sort(()=>Math.random()-0.5);

  // 카드 수에 따라 크기 조정 (20장 이하 크게, 50장 이하 중간, 그 이상 소형)
  const cw = cards.length <= 20 ? 80 : cards.length <= 50 ? 56 : 40;
  const ch = Math.round(cw * 1.5);
  const fs = cards.length <= 20 ? 11 : cards.length <= 50 ? 9 : 8;
  const cardsHtml = cards.map((c,i) => `
    <div class="card-el" data-i="${i}" style="
      width:${cw}px;height:${ch}px;background:linear-gradient(135deg,#3a2a55,#5b6f8a);
      border:2px solid #ffd66b;border-radius:10px;
      display:flex;align-items:center;justify-content:center;
      color:#fff;font-weight:800;cursor:pointer;position:relative;
      transform-style:preserve-3d;transition:transform .6s;user-select:none">
      <div class="face-back" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
        backface-visibility:hidden;font-size:${Math.round(cw*0.4)}px">🂠</div>
      <div class="face-front" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
        background:linear-gradient(135deg,#fff,#ffe1ec);color:#e91e63;border-radius:8px;
        font-size:${fs}px;padding:4px;text-align:center;backface-visibility:hidden;transform:rotateY(180deg);word-break:break-all">
        선택됨
      </div>
    </div>`).join("");
  $("resultBody").innerHTML = `
    <div style="font-size:13px;color:#888;margin-bottom:10px">🃏 카드뽑기</div>
    <div id="cardBox" style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:12px;
      background:#1a1410;border-radius:12px;max-height:60vh;overflow:auto">
      ${cardsHtml}
    </div>
    <div id="cardHint" style="margin-top:10px;font-size:13px;color:var(--muted)">
      카드 ${n}장을 골라 당첨자를 뽑으세요 <span id="pickedCount">(0/${n})</span>
    </div>`;

  const chosenIdx = [];
  document.querySelectorAll(".card-el").forEach((el, i) => {
    el.onclick = () => {
      if (chosenIdx.includes(i)) return;
      if (chosenIdx.length >= n) return;
      chosenIdx.push(i);
      el.style.transform = "rotateY(180deg)";
      el.style.boxShadow = "0 0 24px #ffd66b";
      document.getElementById("pickedCount").textContent = `(${chosenIdx.length}/${n})`;
      $("cardHint").textContent = `카드 ${chosenIdx.length}/${n} 선택됨`;
      if (chosenIdx.length === n) {
        const picked = chosenIdx.map(idx => cards[idx]);
        recordLog({ method: "card", pool, picked,
          entropy: { source: "user-click", ts: Date.now() }, fp: "", seed: "" });
        setTimeout(() => renderResult(picked), 250);
      }
    };
  });

  // 유저가 8초 내에 아무것도 안 고르면 자동으로 n장 랜덤 뽑기
  setTimeout(() => {
    if (chosenIdx.length === 0) {
      const els = document.querySelectorAll(".card-el");
      const idxs = [...Array(cards.length).keys()].sort(()=>Math.random()-0.5).slice(0, n);
      idxs.forEach((idx, k) => setTimeout(() => els[idx].click(), k * 400));
    }
  }, 8000);
}

// 배틀로얄 등 다른 모드에서 cardAnim 이름으로 호출되면 기본 결과만 표시
function cardAnim(picked, pool, seed) { renderResult(picked, seed); }

// ── 배틀로얄 ─────────────────────────────────────
function battleAnim(picked, pool, seed) {
  const W = 480, H = 420;
  const target = picked[0];
  // 풀 전원 참가 (제한 없음)
  const participants = pool.slice().sort(()=>Math.random()-0.5);
  const N = participants.length;

  $("resultBody").innerHTML = `
    <div style="font-size:13px;color:#888;margin-bottom:10px">⚔️ 배틀로얄 — 생존 경쟁</div>
    <div id="battleShell" class="battle-shell">
      <canvas id="battle" width="${W}" height="${H}"
        style="background:radial-gradient(ellipse at center,#3a2818,#1a0f08);
               border-radius:12px;max-width:100%;display:block;margin:0 auto"></canvas>
      <div id="battleFlash" class="battle-flash"></div>
      <div id="battleZoom" style="position:absolute;inset:0;pointer-events:none;border-radius:12px;box-shadow:inset 0 0 0 0 rgba(255,214,107,0);"></div>
    </div>
    <div id="battleLog" style="margin-top:10px;font-size:12px;color:var(--muted);
      height:72px;overflow:hidden;font-family:ui-monospace,monospace;background:#1a1410;
      border-radius:10px;padding:8px 10px;border:1px solid var(--line);"></div>`;
  const cv = document.getElementById("battle"), ctx = cv.getContext("2d");
  const shell = document.getElementById("battleShell");
  const flash = document.getElementById("battleFlash");
  const zoom = document.getElementById("battleZoom");

  // 초기 배치: 원형으로 분산
  const fighters = participants.map((c, i) => {
    const a = (i / N) * Math.PI * 2;
    return {
      c, alive: true,
      x: W/2 + Math.cos(a) * 140,
      y: H/2 + Math.sin(a) * 140,
      vx: (Math.random()-0.5) * 2,
      vy: (Math.random()-0.5) * 2,
      hp: 100,
      flashFrames: 0,
    };
  });

  const log = [];
  const addLog = (s) => {
    log.unshift(s);
    if (log.length > 5) log.pop();
    document.getElementById("battleLog").innerHTML = log.map((x,i)=>`<div style="margin-bottom:${i===0?4:2}px;opacity:${1 - i*0.14};color:${i===0 ? '#ffd66b' : '#d8d2c8'}">${x}</div>`).join("");
  };
  const pulse = () => {
    shell.classList.remove("battle-shake");
    void shell.offsetWidth;
    shell.classList.add("battle-shake");
    flash.classList.add("on");
    zoom.style.boxShadow = "inset 0 0 0 2px rgba(255,214,107,.45), inset 0 0 90px rgba(255,214,107,.12)";
    setTimeout(() => flash.classList.remove("on"), 120);
    setTimeout(() => { zoom.style.boxShadow = "inset 0 0 0 0 rgba(255,214,107,0)"; }, 160);
  };

  let frames = 0;
  const killInterval = 45; // 대략 0.75초마다 한 명 처치
  let finaleStarted = false;
  let finaleAt = 0;

  const drawKeyboard = (x, y, angle, scale = 1, glow = false) => {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.scale(scale, scale);
    if (glow) {
      ctx.shadowColor = "rgba(255,214,107,.45)";
      ctx.shadowBlur = 10;
    }
    ctx.fillStyle = "#23211f";
    ctx.strokeStyle = "#d9d4c7";
    ctx.lineWidth = 1.2;
    roundRect(-16, -6, 32, 12, 3);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = "#4b4741";
    for (let r = -1; r < 2; r++) {
      for (let c = -3; c < 4; c++) {
        ctx.fillRect(c * 4.1 - 1.5, r * 3.2 - 1.1, 2.2, 1.6);
      }
    }
    ctx.fillStyle = "#66615b";
    ctx.fillRect(-11, -4.5, 22, 2.1);
    ctx.restore();
  };

  const roundRect = (x, y, w, h, r) => {
    const rr = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.arcTo(x + w, y, x + w, y + h, rr);
    ctx.arcTo(x + w, y + h, x, y + h, rr);
    ctx.arcTo(x, y + h, x, y, rr);
    ctx.arcTo(x, y, x + w, y, rr);
    ctx.closePath();
  };

  const drawFighter = (f, isTarget) => {
    if (!f.alive) return;
    const hitFlash = f.flashFrames > 0;
    if (hitFlash) f.flashFrames--;
    const body = hitFlash ? "#ff6b6b" : (isTarget ? "#ffd66b" : "#d9d9d9");
    const shirt = hitFlash ? "rgba(255,107,107,.35)" : (isTarget ? "rgba(255,214,107,.24)" : "rgba(255,255,255,.12)");
    const skin = hitFlash ? "#7a3a3a" : "#efe2d4";
    const facing = Math.sin((frames + f.x + f.y) * 0.04);
    const armSwing = Math.sin((frames + f.x) * 0.12) * 0.4;
    const legSwing = Math.cos((frames + f.y) * 0.12) * 0.35;
    const weaponAngle = facing * 0.55 - 0.35;

    // shadow
    ctx.fillStyle = "rgba(0,0,0,.25)";
    ctx.beginPath();
    ctx.ellipse(f.x, f.y + 24, 12, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // weapon
    drawKeyboard(f.x + facing * 7, f.y - 2, weaponAngle, 0.9 + (hitFlash ? 0.08 : 0), isTarget);

    // legs
    ctx.strokeStyle = body;
    ctx.lineWidth = 3.2;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(f.x, f.y + 8);
    ctx.lineTo(f.x - 7 + legSwing * 3, f.y + 20);
    ctx.moveTo(f.x, f.y + 8);
    ctx.lineTo(f.x + 7 - legSwing * 3, f.y + 20);
    ctx.stroke();

    // torso
    ctx.fillStyle = shirt;
    ctx.strokeStyle = body;
    ctx.lineWidth = 2;
    roundRect(f.x - 8, f.y - 8, 16, 20, 7);
    ctx.fill();
    ctx.stroke();

    // head
    ctx.fillStyle = skin;
    ctx.strokeStyle = body;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(f.x, f.y - 18, 8.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    // face highlight
    ctx.fillStyle = hitFlash ? "#ff8a8a" : "rgba(255,255,255,.22)";
    ctx.beginPath();
    ctx.arc(f.x - 2.6, f.y - 20, 1.6, 0, Math.PI * 2);
    ctx.fill();

    // arms holding keyboard
    ctx.strokeStyle = body;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(f.x - 7, f.y - 2);
    ctx.lineTo(f.x - 13 + armSwing * 4, f.y + 4);
    ctx.moveTo(f.x + 7, f.y - 2);
    ctx.lineTo(f.x + 14 - armSwing * 4, f.y + 3);
    ctx.stroke();

    // name
    ctx.fillStyle = hitFlash ? "#ff5050" : (isTarget ? "#ffd66b" : "#ccc");
    ctx.font = `${isTarget ? "bold " : ""}10px sans-serif`;
    ctx.textAlign = "center";
    ctx.fillText(esc(f.c.name).slice(0,8), f.x, f.y - 30);
  };

  const step = () => {
    frames++;
    // 물리
    for (const f of fighters) {
      if (!f.alive) continue;
      f.x += f.vx; f.y += f.vy;
      f.vx *= 0.97; f.vy *= 0.97;
      if (Math.abs(f.vx) < 0.3) f.vx += (Math.random()-0.5) * 1.5;
      if (Math.abs(f.vy) < 0.3) f.vy += (Math.random()-0.5) * 1.5;
      if (f.x < 20) { f.x = 20; f.vx = Math.abs(f.vx); }
      if (f.x > W-20) { f.x = W-20; f.vx = -Math.abs(f.vx); }
      if (f.y < 30) { f.y = 30; f.vy = Math.abs(f.vy); }
      if (f.y > H-30) { f.y = H-30; f.vy = -Math.abs(f.vy); }
    }

    // 캔버스
    ctx.clearRect(0,0,W,H);
    // 바닥 그림자
    ctx.fillStyle = "rgba(0,0,0,.3)";
    for (const f of fighters) {
      if (!f.alive) continue;
      ctx.beginPath(); ctx.ellipse(f.x, f.y+22, 10, 3, 0, 0, Math.PI*2); ctx.fill();
    }
    const alive = fighters.filter(f => f.alive);
    const crowd = Math.max(alive.length, 1);
    const scale = Math.min(1.18, 0.92 + (participants.length - crowd) / Math.max(participants.length,1) * 0.32);
    shell.style.transform = `scale(${scale})`;
    // 파이터
    for (const f of fighters) drawFighter(f, false);

    // 주기적으로 한 명 처치 (타겟은 살려두기)
    if (frames % killInterval === 0) {
      const aliveCount = alive.length;
      if (aliveCount > 1) {
        // 타겟이 아닌 파이터 중 랜덤 선택해 처치
        const victims = alive.filter(f => f.c !== target);
        if (victims.length > 0) {
          const victim = victims[Math.floor(Math.random() * victims.length)];
          // 가해자: 가장 가까운 생존자
          const dists = alive.filter(f => f !== victim)
            .map(f => ({f, d: Math.hypot(f.x-victim.x, f.y-victim.y)}))
            .sort((a,b) => a.d-b.d);
          const killer = dists[0].f;
          victim.alive = false;
          killer.flashFrames = 20;
          pulse();
          addLog(`💥 ${esc(killer.c.name).slice(0,10)} vs ${esc(victim.c.name).slice(0,10)} 충돌! 생존 ${aliveCount-1}명`);
        }
      }
    }

    const stillAlive = fighters.filter(f => f.alive).length;
    if (!finaleStarted && stillAlive <= 1) {
      finaleStarted = true;
      finaleAt = performance.now();
      addLog(`🏆 ${esc(picked[0].name).slice(0,10)} 최후 생존!`);
      pulse();
      flash.classList.add("on");
    }

    if (finaleStarted) {
      ctx.fillStyle = "rgba(255,214,107,.15)";
      ctx.fillRect(0, 0, W, H);
      ctx.beginPath();
      ctx.arc(W/2, H/2, 130, 0, Math.PI*2);
      ctx.strokeStyle = "rgba(255,214,107,.5)";
      ctx.lineWidth = 4;
      ctx.stroke();
      ctx.fillStyle = "#ffd66b";
      ctx.font = "bold 28px sans-serif"; ctx.textAlign = "center";
      ctx.fillText("WINNER", W/2, 60);
      ctx.font = "bold 18px sans-serif";
      ctx.fillText(esc(picked[0].name), W/2, H - 20);
      if (performance.now() - finaleAt > 3200) {
        renderResult(picked, seed);
        return;
      }
      requestAnimationFrame(step);
      return;
    }

    requestAnimationFrame(step);
  };
  step();
}


async function captureResult(auto = false) {
  const stat = $("snapStatus");
  if (typeof html2canvas === "undefined") { stat.textContent = "캡처 라이브러리 로드 실패"; return; }
  try {
    stat.textContent = "캡처 중…";
    const card = document.getElementById("resultCard");
    // 버튼/상태는 캡처 제외
    const ignore = Array.from(card.querySelectorAll(".row, #snapStatus"));
    ignore.forEach(el => { el.dataset._hide = el.style.visibility || ""; el.style.visibility = "hidden"; });
    const canvas = await html2canvas(card, { backgroundColor: "#ffffff", scale: 2 });
    ignore.forEach(el => { el.style.visibility = el.dataset._hide; });
    const ts = new Date();
    const pad = n => String(n).padStart(2,"0");
    const fname = `dororong-${ts.getFullYear()}${pad(ts.getMonth()+1)}${pad(ts.getDate())}-${pad(ts.getHours())}${pad(ts.getMinutes())}${pad(ts.getSeconds())}.png`;
    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = fname; a.click();
      URL.revokeObjectURL(url);
      stat.textContent = (auto ? "✓ 자동 저장됨: " : "✓ 저장됨: ") + fname;
    });
  } catch (e) { stat.textContent = "캡처 실패: " + e.message; }
}

$("snapBtn").onclick = () => captureResult(false);
$("closeResult").onclick = () => $("resultModal").classList.add("hidden");

// renderResult 호출 후 자동 캡처
const _origRender = renderResult;
renderResult = function(picked, seed) {
  _origRender(picked, seed);
  setTimeout(() => captureResult(true), 400);
};
